<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPod Moderne</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0b0b0b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Boîtier de l'iPod */
        .ipod-container {
            width: 360px;
            height: 640px;
            background: linear-gradient(145deg, #1e1e24, #111115);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 2px 3px rgba(255,255,255,0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Écran */
        .screen {
            width: 100%;
            height: 270px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            transition: all 0.5s ease;
        }

        .screen-bg {
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(25px) brightness(0.6);
            z-index: 1;
            transition: background-image 0.5s ease;
        }

        .screen-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        .cover-art {
            width: 130px;
            height: 130px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .playing .cover-art {
            transform: scale(1.05);
        }

        .track-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Barre de progression */
        .progress-bar-container {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 10px;
        }

        .time {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            font-variant-numeric: tabular-nums;
            width: 30px;
        }

        .progress-bg {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ffffff;
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        /* La Click Wheel (Molette) */
        .click-wheel {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: #232329;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 2px 5px rgba(255,255,255,0.05);
            cursor: pointer;
            touch-action: none;
        }

        .wheel-btn {
            position: absolute;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .wheel-btn:active {
            color: #ffffff;
        }

        .btn-menu { top: 18px; }
        .btn-next { right: 18px; }
        .btn-prev { left: 18px; }
        .btn-play { bottom: 18px; }

        /* Bouton Central */
        .center-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffffff, #dddddd);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 2px 2px rgba(255,255,255,0.5);
            z-index: 10;
            transition: transform 0.1s;
        }

        .center-button:active {
            transform: scale(0.95);
        }

        /* Petite LED d'état discrète */
        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #ff3b30;
            border-radius: 50%;
            position: absolute;
            top: 15px;
            right: 20px;
            box-shadow: 0 0 8px #ff3b30;
        }
        .playing .status-dot {
            background-color: #34c759;
            box-shadow: 0 0 8px #34c759;
        }
    </style>
</head>
<body>

    <div class="ipod-container" id="ipod">
        <div class="screen" id="screen">
            <div class="screen-bg" id="screenBg"></div>
            <div class="status-dot"></div>
            <div class="screen-content">
                <img src="" alt="Cover" class="cover-art" id="coverArt">
                <div class="track-title" id="trackTitle">Titre</div>
                <div class="track-artist" id="trackArtist">Artiste</div>
                
                <div class="progress-bar-container">
                    <span class="time" id="timeCurrent">0:00</span>
                    <div class="progress-bg">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="time" id="timeTotal">0:00</span>
                </div>
            </div>
        </div>

        <div class="click-wheel" id="wheel">
            <div class="wheel-btn btn-menu" id="menuBtn">MENU</div>
            <div class="wheel-btn btn-next" id="nextBtn">▶▶</div>
            <div class="wheel-btn btn-prev" id="prevBtn">◀◀</div>
            <div class="wheel-btn btn-play" id="playBtn">▶⏸</div>
            
            <div class="center-button" id="centerBtn"></div>
        </div>
    </div>

    <script>
        // Data de la playlist (Simule l'importation dynamique)
        const playlist = [
            { title: "Starboy", artist: "The Weeknd", cover: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400", duration: 230 },
            { title: "Midnight City", artist: "M83", cover: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400", duration: 243 },
            { title: "Instant Crush", artist: "Daft Punk", cover: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400", duration: 337 },
            { title: "Nightcall", artist: "Kavinsky", cover: "https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?w=400", duration: 258 }
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let timer = null;
        let currentSeconds = 0;

        // Variables pour capturer la rotation du "Scroll" sur la molette
        let lastAngle = 0;
        let accumulatedAngle = 0;
        const wheel = document.getElementById('wheel');

        // Éléments DOM
        const screen = document.getElementById('screen');
        const screenBg = document.getElementById('screenBg');
        const coverArt = document.getElementById('coverArt');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const progressFill = document.getElementById('progressFill');
        const timeCurrent = document.getElementById('timeCurrent');
        const timeTotal = document.getElementById('timeTotal');

        // Mettre à jour l'interface avec la musique actuelle
        function updateTrack() {
            const track = playlist[currentIndex];
            trackTitle.textContent = track.title;
            trackArtist.textContent = track.artist;
            coverArt.src = track.cover;
            screenBg.style.backgroundImage = `url('${track.cover}')`;
            timeTotal.textContent = formatTime(track.duration);
            resetProgress();
        }

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // Gestion de la lecture
        function togglePlay() {
            isPlaying = !isPlaying;
            triggerHaptic(25); // Vibration au clic central
            if (isPlaying) {
                screen.classList.add('playing');
                timer = setInterval(() => {
                    if (currentSeconds < playlist[currentIndex].duration) {
                        currentSeconds++;
                        timeCurrent.textContent = formatTime(currentSeconds);
                        progressFill.style.width = `${(currentSeconds / playlist[currentIndex].duration) * 100}%`;
                    } else {
                        nextTrack();
                    }
                }, 1000);
            } else {
                screen.classList.remove('playing');
                clearInterval(timer);
            }
        }

        function resetProgress() {
            currentSeconds = 0;
            timeCurrent.textContent = "0:00";
            progressFill.style.width = "0%";
            if (isPlaying) {
                clearInterval(timer);
                isPlaying = false;
                togglePlay();
            }
        }

        function nextTrack() {
            triggerHaptic(10); // Vibration légère de défilement
            currentIndex = (currentIndex + 1) % playlist.length;
            updateTrack();
        }

        function prevTrack() {
            triggerHaptic(10);
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            updateTrack();
        }

        // Retour haptique simulé (Vibration API des mobiles si ouvert sur smartphone, sinon neutre)
        function triggerHaptic(ms) {
            if (navigator.vibrate) {
                navigator.vibrate(ms);
            }
        }

        // --- Logique Mathématique Spéciale Molette iPod (Détection de Rotation) ---
        function getAngle(clientX, clientY) {
            const rect = wheel.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            return Math.atan2(clientY - centerY, clientX - centerX);
        }

        function handlePointerStart(e) {
            if (e.target.id === 'centerBtn') return; // Ignorer le bouton blanc central
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            lastAngle = getAngle(clientX, clientY);
            accumulatedAngle = 0;
            
            document.addEventListener('pointermove', handlePointerMove);
            document.addEventListener('pointerup', handlePointerEnd);
        }

        function handlePointerMove(e) {
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            if (!clientX || !clientY) return;

            const currentAngle = getAngle(clientX, clientY);
            let delta = currentAngle - lastAngle;

            // Ajustement pour éviter les sauts brusques d'angles
            if (delta > Math.PI) delta -= 2 * Math.PI;
            if (delta < -Math.PI) delta += 2 * Math.PI;

            accumulatedAngle += delta;
            lastAngle = currentAngle;

            // Sensibilité de rotation : tous les ~45 degrés accumulés, on passe au son suivant/précédent
            if (accumulatedAngle > 0.8) {
                accumulatedAngle = 0;
                nextTrack();
            } else if (accumulatedAngle < -0.8) {
                accumulatedAngle = 0;
                prevTrack();
            }
        }

        function handlePointerEnd() {
            document.removeEventListener('pointermove', handlePointerMove);
            document.removeEventListener('pointerup', handlePointerEnd);
        }

        // Événements boutons et molette
        wheel.addEventListener('pointerdown', handlePointerStart);
        document.getElementById('centerBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlay();
        });
        
        document.getElementById('nextBtn').addEventListener('click', (e) => { e.stopPropagation(); nextTrack(); });
        document.getElementById('prevBtn').addEventListener('click', (e) => { e.stopPropagation(); prevTrack(); });
        document.getElementById('playBtn').addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
        document.getElementById('menuBtn').addEventListener('click', (e) => { e.stopPropagation(); triggerHaptic(15); alert("Menu Catégories (Simulation Google Sheets)"); });

        // Initialisation de l'App au démarrage
        updateTrack();
    </script>
</body>
</html>
